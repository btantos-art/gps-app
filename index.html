<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greek Grid GPS - Πολύγωνα σε DXF</title>
    
    <!-- Leaflet.js για τον χάρτη -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        #map { height: 50vh; width: 100%; border-bottom: 3px solid #e94560; }
        #controls {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #16213e;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 1 auto;
            min-width: 140px;
        }
        button:active { transform: scale(0.95); }
        .btn-gps { background: #4CAF50; color: white; }
        .btn-poly { background: #e94560; color: white; }
        .btn-dxf { background: #0f3460; color: white; }
        .btn-clear { background: #533483; color: white; }
        #info {
            padding: 15px 20px;
            background: #0f3460;
            margin: 10px 20px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 80px;
        }
        #info strong { color: #e94560; }
        #coords-list {
            padding: 10px 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #16213e;
            margin: 0 20px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-family: monospace;
        }
        #coords-list div { padding: 4px 0; border-bottom: 1px solid #2a3a5e; }
        .badge {
            display: inline-block;
            background: #e94560;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        @media (max-width: 600px) {
            button { font-size: 14px; padding: 10px 16px; min-width: 100px; }
            #info { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- ΧΑΡΤΗΣ -->
    <div id="map"></div>

    <!-- ΚΟΥΜΠΙΑ -->
    <div id="controls">
        <button class="btn-gps" onclick="getGPS()">📍 Πάρε Θέση</button>
        <button class="btn-poly" onclick="addPoint()" id="addBtn" disabled>➕ Προσθήκη στο Πολύγωνο</button>
        <button class="btn-dxf" onclick="exportDXF()">💾 Κατέβασε DXF</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Καθαρισμός</button>
    </div>

    <!-- ΠΛΗΡΟΦΟΡΙΕΣ -->
    <div id="info">
        <strong>📍 Τρέχουσα θέση (ΕΓΣΑ87):</strong> <span id="currentPos">Αναμονή για GPS...</span><br>
        <strong>📐 Σημεία πολυγώνου:</strong> <span id="pointCount">0</span>
    </div>

    <!-- ΛΙΣΤΑ ΣΗΜΕΙΩΝ -->
    <div id="coords-list"></div>

    <script>
        // ============================================================
        // 1. ΜΕΤΑΤΡΟΠΗ WGS84 -> ΕΓΣΑ87 (προσεγγιστικός τύπος)
        // ============================================================
        function wgs84ToEGSA87(lat, lon) {
            // Χρησιμοποιούμε τη μέθοδο των 7 παραμέτρων (Helmert)
            // Για ακρίβεια ~1-2 μέτρα (αρκετή για τις περισσότερες χρήσεις)
            const a = 6378137.0;        // Μεγάλος ημιάξονας WGS84
            const f = 1 / 298.257223563; // Πλάτυνση WGS84
            const e2 = 2*f - f*f;
            
            // Μετατροπή σε ακτίνια
            const phi = lat * Math.PI / 180;
            const lambda = lon * Math.PI / 180;
            
            // Ακτίνα καμπυλότητας
            const N = a / Math.sqrt(1 - e2 * Math.sin(phi) * Math.sin(phi));
            
            // Συντεταγμένες σε μέτρα (Gauss-Krüger)
            // Παράμετροι για την Ελλάδα (ζώνη 34)
            const L0 = 24 * Math.PI / 180; // Κεντρικός μεσημβρινός
            const dL = lambda - L0;
            
            const X = N * Math.cos(phi) * dL;
            const Y = (N * (1 - e2) / (1 - e2 * Math.sin(phi)*Math.sin(phi))) * 
                      (Math.tan(phi) + (e2 * Math.cos(phi)*Math.cos(phi) * Math.tan(phi)*Math.tan(phi)*Math.tan(phi))/2);
            
            // Προσθήκη σταθερών μετατόπισης για ΕΓΣΑ87
            const X_EGSA = X * 0.9996 + 500000; // Ψευδοανατολή
            const Y_EGSA = Y * 0.9996;          // Ψευδοβόρεια
            
            return { x: Math.round(X_EGSA), y: Math.round(Y_EGSA) };
        }

        // ============================================================
        // 2. ΚΑΤΑΣΤΑΣΗ ΕΦΑΡΜΟΓΗΣ
        // ============================================================
        let currentPos = null;        // { lat, lon, x, y }
        let polygonPoints = [];       // [ {x, y, lat, lon}, ... ]
        let map = null;
        let marker = null;
        let polyline = null;
        let polygonLayer = null;

        // ============================================================
        // 3. ΑΡΧΙΚΟΠΟΙΗΣΗ ΧΑΡΤΗ
        // ============================================================
        function initMap() {
            map = L.map('map').setView([38.0, 23.7], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // ============================================================
        // 4. ΛΗΨΗ GPS
        // ============================================================
        function getGPS() {
            if (!navigator.geolocation) {
                document.getElementById('currentPos').innerText = '❌ Το GPS δεν υποστηρίζεται';
                return;
            }

            document.getElementById('currentPos').innerText = '⏳ Αναζήτηση σήματος GPS...';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const eg = wgs84ToEGSA87(lat, lon);

                    currentPos = { lat, lon, x: eg.x, y: eg.y };

                    // Ενημέρωση UI
                    document.getElementById('currentPos').innerHTML = 
                        `X=${eg.x} m, Y=${eg.y} m &nbsp; <span style="font-size:12px;color:#aaa;">(${lat.toFixed(6)}, ${lon.toFixed(6)})</span>`;

                    // Ενεργοποίηση κουμπιού "Προσθήκη"
                    document.getElementById('addBtn').disabled = false;

                    // Σημάδι στον χάρτη
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`📍 Θέση<br>ΕΓΣΑ87: X=${eg.x}, Y=${eg.y}`)
                        .openPopup();
                    map.setView([lat, lon], 15);
                },
                (err) => {
                    document.getElementById('currentPos').innerText = `❌ Σφάλμα GPS: ${err.message}`;
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        // ============================================================
        // 5. ΠΡΟΣΘΗΚΗ ΣΗΜΕΙΟΥ ΣΤΟ ΠΟΛΥΓΩΝΟ
        // ============================================================
        function addPoint() {
            if (!currentPos) {
                alert('Πάρε πρώτα θέση με το κουμπί "Πάρε Θέση"');
                return;
            }

            polygonPoints.push({ ...currentPos });
            updatePolygonDisplay();

            // Σχεδίαση στον χάρτη
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);

            const latlngs = polygonPoints.map(p => [p.lat, p.lon]);

            if (latlngs.length === 1) {
                // Μόνο σημείο
                polygonLayer = L.marker(latlngs[0]).addTo(map);
            } else {
                // Γραμμή ή πολύγωνο
                polyline = L.polyline(latlngs, { color: '#e94560', weight: 3 }).addTo(map);
                if (latlngs.length >= 3) {
                    polygonLayer = L.polygon(latlngs, { color: '#e94560', fillColor: '#e94560', fillOpacity: 0.2 }).addTo(map);
                }
            }
            
            // Εστίαση στο τελευταίο σημείο
            map.setView(latlngs[latlngs.length-1], 15);
        }

        // ============================================================
        // 6. ΕΝΗΜΕΡΩΣΗ ΟΘΟΝΗΣ
        // ============================================================
        function updatePolygonDisplay() {
            document.getElementById('pointCount').innerText = polygonPoints.length;

            const list = document.getElementById('coords-list');
            list.innerHTML = polygonPoints.map((p, i) => 
                `<div>#${i+1} → X=${p.x} m, Y=${p.y} m <span class="badge">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</span></div>`
            ).join('');
            list.scrollTop = list.scrollHeight;
        }

        // ============================================================
        // 7. ΕΞΑΓΩΓΗ DXF
        // ============================================================
        function exportDXF() {
            if (polygonPoints.length < 3) {
                alert('⚠️ Χρειάζονται τουλάχιστον 3 σημεία για να φτιάξεις πολύγωνο!');
                return;
            }

            // Δημιουργία περιεχομένου DXF (απλό ASCII format)
            let dxf = `0\nSECTION\n2\nENTITIES\n`;

            // Προσθήκη πολυγώνου (LWPOLYLINE)
            dxf += `0\nLWPOLYLINE\n8\n0\n90\n${polygonPoints.length}\n70\n1\n`; // 70=1 κλειστό
            polygonPoints.forEach(p => {
                dxf += `10\n${p.x}\n20\n${p.y}\n`;
            });

            dxf += `0\nENDSEC\n0\nEOF\n`;

            // Δημιουργία και λήψη αρχείου
            const blob = new Blob([dxf], { type: 'application/dxf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `polygon_${new Date().toISOString().slice(0,10)}.dxf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert('✅ Το DXF κατέβηκε επιτυχώς!');
        }

        // ============================================================
        // 8. ΚΑΘΑΡΙΣΜΟΣ
        // ============================================================
        function clearAll() {
            polygonPoints = [];
            currentPos = null;
            document.getElementById('currentPos').innerText = 'Αναμονή για GPS...';
            document.getElementById('pointCount').innerText = '0';
            document.getElementById('coords-list').innerHTML = '';
            document.getElementById('addBtn').disabled = true;
            
            if (marker) map.removeLayer(marker);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);
            marker = polyline = polygonLayer = null;
        }

        // ============================================================
        // 9. ΕΚΚΙΝΗΣΗ
        // ============================================================
        window.onload = initMap;
    </script>
</body>
</html>
