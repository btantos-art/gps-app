<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greek Grid GPS - Πολύγωνα & KMZ</title>
    
    <!-- Leaflet.js & JSZip -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        #map { height: 45vh; width: 100%; border-bottom: 3px solid #e94560; }
        #controls {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            background: #16213e;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 1 auto;
            min-width: 100px;
        }
        button:active { transform: scale(0.95); }
        .btn-gps { background: #4CAF50; color: white; }
        .btn-add { background: #e94560; color: white; }
        .btn-dxf { background: #0f3460; color: white; }
        .btn-kmz { background: #ff9800; color: white; }
        .btn-clear { background: #533483; color: white; }
        #info {
            padding: 12px 16px;
            background: #0f3460;
            margin: 10px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            min-height: 70px;
        }
        #info strong { color: #e94560; }
        #coords-list {
            padding: 8px 12px;
            max-height: 160px;
            overflow-y: auto;
            background: #16213e;
            margin: 0 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        #coords-list div { padding: 3px 0; border-bottom: 1px solid #2a3a5e; }
        .badge {
            display: inline-block;
            background: #e94560;
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 6px;
        }
        .detail { color: #aaa; font-size: 11px; margin-left: 10px; }
        @media (max-width: 600px) {
            button { font-size: 12px; padding: 8px 12px; min-width: 70px; }
            #info { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button class="btn-gps" onclick="getGPS()">📍 GPS</button>
        <button class="btn-add" onclick="addPoint()" id="addBtn" disabled>➕ Προσθήκη</button>
        <button class="btn-dxf" onclick="exportDXF()">💾 DXF</button>
        <button class="btn-kmz" onclick="exportKMZ()">🌍 KMZ</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Καθαρισμός</button>
    </div>

    <div id="info">
        <strong>📍 Θέση (ΕΓΣΑ87):</strong> <span id="currentPos">Αναμονή GPS...</span><br>
        <strong>📐 Σημεία:</strong> <span id="pointCount">0</span>
        <span id="extraInfo" style="display:block;margin-top:4px;font-size:12px;color:#aaa;"></span>
    </div>

    <div id="coords-list"></div>

    <script>
        // ============================================================
        // 1. ΜΕΤΑΤΡΟΠΗ WGS84 -> ΕΓΣΑ87
        // ============================================================
        function wgs84ToEGSA87(lat, lon) {
            const a = 6378137.0;
            const f = 1 / 298.257223563;
            const e2 = 2*f - f*f;
            const phi = lat * Math.PI / 180;
            const lambda = lon * Math.PI / 180;
            const N = a / Math.sqrt(1 - e2 * Math.sin(phi) * Math.sin(phi));
            const L0 = 24 * Math.PI / 180;
            const dL = lambda - L0;
            const X = N * Math.cos(phi) * dL;
            const Y = (N * (1 - e2) / (1 - e2 * Math.sin(phi)*Math.sin(phi))) * 
                      (Math.tan(phi) + (e2 * Math.cos(phi)*Math.cos(phi) * Math.tan(phi)*Math.tan(phi)*Math.tan(phi))/2);
            return { x: Math.round(X * 0.9996 + 500000), y: Math.round(Y * 0.9996) };
        }

        // ============================================================
        // 2. ΚΑΤΑΣΤΑΣΗ
        // ============================================================
        let currentPos = null;        // { lat, lon, x, y, alt, acc }
        let polygonPoints = [];       // { x, y, lat, lon, alt, acc }
        let map = null, marker = null, polyline = null, polygonLayer = null;

        // ============================================================
        // 3. ΧΑΡΤΗΣ
        // ============================================================
        function initMap() {
            map = L.map('map').setView([38.0, 23.7], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // ============================================================
        // 4. ΛΗΨΗ GPS (με Υψόμετρο & Ακρίβεια)
        // ============================================================
        function getGPS() {
            if (!navigator.geolocation) {
                document.getElementById('currentPos').innerText = '❌ GPS δεν υποστηρίζεται';
                return;
            }
            document.getElementById('currentPos').innerText = '⏳ Αναζήτηση σήματος...';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const alt = pos.coords.altitude;        // υψόμετρο (m)
                    const acc = pos.coords.accuracy;        // ακρίβεια (m)
                    const eg = wgs84ToEGSA87(lat, lon);

                    currentPos = { 
                        lat, lon, 
                        x: eg.x, y: eg.y,
                        alt: alt !== null ? Math.round(alt * 10) / 10 : null,
                        acc: acc !== null ? Math.round(acc * 10) / 10 : null
                    };

                    // Ενημέρωση UI
                    let altText = currentPos.alt !== null ? `${currentPos.alt} m` : 'N/A';
                    let accText = currentPos.acc !== null ? `${currentPos.acc} m` : 'N/A';
                    document.getElementById('currentPos').innerHTML = 
                        `X=${eg.x} m, Y=${eg.y} m &nbsp; <span style="font-size:11px;color:#aaa;">(${lat.toFixed(5)}, ${lon.toFixed(5)})</span>`;
                    document.getElementById('extraInfo').innerHTML = 
                        `📏 Υψόμετρο: ${altText} &nbsp;|&nbsp; 🎯 Ακρίβεια: ±${accText}`;

                    document.getElementById('addBtn').disabled = false;

                    // Σημάδι χάρτη
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`📍 Θέση<br>ΕΓΣΑ87: X=${eg.x}, Y=${eg.y}<br>Υψόμετρο: ${altText}<br>Ακρίβεια: ±${accText}`)
                        .openPopup();
                    map.setView([lat, lon], 15);
                },
                (err) => {
                    document.getElementById('currentPos').innerText = `❌ Σφάλμα: ${err.message}`;
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        // ============================================================
        // 5. ΠΡΟΣΘΗΚΗ ΣΗΜΕΙΟΥ
        // ============================================================
        function addPoint() {
            if (!currentPos) {
                alert('Πάρε πρώτα GPS!');
                return;
            }
            polygonPoints.push({ ...currentPos });
            updateDisplay();

            // Σχεδίαση
            const ll = polygonPoints.map(p => [p.lat, p.lon]);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);

            if (ll.length === 1) {
                polygonLayer = L.marker(ll[0]).addTo(map);
            } else {
                polyline = L.polyline(ll, { color: '#e94560', weight: 3 }).addTo(map);
                if (ll.length >= 3) {
                    polygonLayer = L.polygon(ll, { color: '#e94560', fillColor: '#e94560', fillOpacity: 0.2 }).addTo(map);
                }
            }
            map.setView(ll[ll.length-1], 15);
        }

        // ============================================================
        // 6. ΕΝΗΜΕΡΩΣΗ ΟΘΟΝΗΣ
        // ============================================================
        function updateDisplay() {
            document.getElementById('pointCount').innerText = polygonPoints.length;
            const list = document.getElementById('coords-list');
            list.innerHTML = polygonPoints.map((p, i) => {
                let altTxt = p.alt !== null ? `${p.alt}m` : 'N/A';
                let accTxt = p.acc !== null ? `±${p.acc}m` : 'N/A';
                return `<div>#${i+1} → X=${p.x}m, Y=${p.y}m <span class="detail">Υψ.${altTxt} | ${accTxt}</span></div>`;
            }).join('');
            list.scrollTop = list.scrollHeight;
        }

        // ============================================================
        // 7. ΕΞΑΓΩΓΗ DXF (με Υψόμετρο ως Z)
        // ============================================================
        function exportDXF() {
            if (polygonPoints.length < 3) {
                alert('⚠️ Χρειάζονται ≥3 σημεία για πολύγωνο!');
                return;
            }
            let dxf = `0\nSECTION\n2\nENTITIES\n0\nLWPOLYLINE\n8\n0\n90\n${polygonPoints.length}\n70\n1\n`;
            polygonPoints.forEach(p => {
                const z = (p.alt !== null) ? p.alt : 0;
                dxf += `10\n${p.x}\n20\n${p.y}\n38\n${z}\n`;
            });
            dxf += `0\nENDSEC\n0\nEOF\n`;

            const blob = new Blob([dxf], { type: 'application/dxf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `polygon_${new Date().toISOString().slice(0,10)}.dxf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert('✅ DXF κατέβηκε!');
        }

        // ============================================================
        // 8. ΕΞΑΓΩΓΗ KMZ (Google Earth)
        // ============================================================
        function exportKMZ() {
            if (polygonPoints.length < 3) {
                alert('⚠️ Χρειάζονται ≥3 σημεία για KMZ!');
                return;
            }

            // --- Δημιουργία KML ---
            let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>Πολύγωνο GPS</name>
    <description>Δημιουργήθηκε με Greek Grid GPS app</description>
`;

            // Προσθήκη σημείων (Placemarks)
            polygonPoints.forEach((p, i) => {
                const alt = (p.alt !== null) ? p.alt : 0;
                kml += `
    <Placemark>
      <name>Σημείο ${i+1}</name>
      <description>X=${p.x} Y=${p.y} | Υψόμετρο: ${alt}m</description>
      <Point>
        <coordinates>${p.lon},${p.lat},${alt}</coordinates>
      </Point>
    </Placemark>
`;
            });

            // Προσθήκη πολυγώνου
            const coords = polygonPoints.map(p => {
                const alt = (p.alt !== null) ? p.alt : 0;
                return `${p.lon},${p.lat},${alt}`;
            }).join(' ');
            kml += `
    <Placemark>
      <name>Πολύγωνο</name>
      <Polygon>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>${coords}</coordinates>
          </LinearRing>
        </outerBoundaryIs>
      </Polygon>
    </Placemark>
`;

            kml += `  </Document>\n</kml>`;

            // --- Δημιουργία KMZ (zip με το KML μέσα) ---
            const zip = new JSZip();
            zip.file("polygon.kml", kml);
            zip.generateAsync({ type: "blob" }).then(function(content) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = `polygon_${new Date().toISOString().slice(0,10)}.kmz`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                alert('✅ KMZ κατέβηκε! Άνοιξε το με Google Earth.');
            });
        }

        // ============================================================
        // 9. ΚΑΘΑΡΙΣΜΟΣ
        // ============================================================
        function clearAll() {
            polygonPoints = [];
            currentPos = null;
            document.getElementById('currentPos').innerText = 'Αναμονή GPS...';
            document.getElementById('pointCount').innerText = '0';
            document.getElementById('coords-list').innerHTML = '';
            document.getElementById('addBtn').disabled = true;
            document.getElementById('extraInfo').innerHTML = '';
            if (marker) map.removeLayer(marker);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);
            marker = polyline = polygonLayer = null;
        }

        // ============================================================
        // 10. ΕΚΚΙΝΗΣΗ
        // ============================================================
        window.onload = initMap;
    </script>
</body>
</html>
