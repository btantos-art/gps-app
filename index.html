<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greek Grid GPS Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        #map { height: 40vh; width: 100%; border-bottom: 3px solid #e94560; }
        #controls {
            padding: 10px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            background: #16213e;
        }
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            min-width: 80px;
        }
        button:active { transform: scale(0.95); }
        .btn-gps { background: #4CAF50; color: white; }
        .btn-avg { background: #2196F3; color: white; }
        .btn-add { background: #e94560; color: white; }
        .btn-dxf { background: #0f3460; color: white; }
        .btn-kmz { background: #ff9800; color: white; }
        .btn-clear { background: #533483; color: white; }
        #info {
            padding: 10px 14px;
            background: #0f3460;
            margin: 8px 10px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-height: 60px;
        }
        #info strong { color: #e94560; }
        #status {
            padding: 6px 12px;
            margin: 0 10px 6px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            background: #1a1a2e;
        }
        #coords-list {
            padding: 6px 10px;
            max-height: 140px;
            overflow-y: auto;
            background: #16213e;
            margin: 0 10px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        #coords-list div { padding: 3px 0; border-bottom: 1px solid #2a3a5e; display: flex; align-items: center; gap: 8px; }
        .badge { display: inline-block; padding: 1px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-green { background: #4CAF50; color: white; }
        .badge-orange { background: #ff9800; color: white; }
        .badge-red { background: #f44336; color: white; }
        .detail { color: #aaa; font-size: 11px; margin-left: auto; }
        .accuracy-bar {
            width: 60px;
            height: 6px;
            border-radius: 3px;
            background: #333;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 4px;
        }
        .accuracy-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .status-text { font-weight: bold; }
        @media (max-width: 600px) {
            button { font-size: 11px; padding: 6px 10px; min-width: 60px; }
            #info { font-size: 11px; padding: 8px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button class="btn-gps" onclick="getGPS()">📍 GPS</button>
        <button class="btn-avg" onclick="startAverage()" id="avgBtn">📊 Μέσος Όρος</button>
        <button class="btn-add" onclick="addPoint()" id="addBtn" disabled>➕ Προσθήκη</button>
        <button class="btn-dxf" onclick="exportDXF()">💾 DXF</button>
        <button class="btn-kmz" onclick="exportKMZ()">🌍 KMZ</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Καθαρισμός</button>
    </div>

    <div id="status">🟢 Έτοιμο</div>

    <div id="info">
        <strong>📍 Θέση (ΕΓΣΑ87):</strong> <span id="currentPos">Αναμονή GPS...</span><br>
        <strong>📐 Σημεία:</strong> <span id="pointCount">0</span>
        <span id="extraInfo" style="display:block;margin-top:3px;font-size:11px;color:#aaa;"></span>
    </div>

    <div id="coords-list"></div>

    <script>
        // ============================================================
        // 1. ΜΕΤΑΤΡΟΠΗ WGS84 -> ΕΓΣΑ87
        // ============================================================
        function wgs84ToEGSA87(lat, lon) {
            const a = 6378137.0, f = 1/298.257223563, e2 = 2*f - f*f;
            const phi = lat * Math.PI/180, lam = lon * Math.PI/180;
            const N = a / Math.sqrt(1 - e2 * Math.sin(phi)**2);
            const L0 = 24 * Math.PI/180, dL = lam - L0;
            const X = N * Math.cos(phi) * dL;
            const Y = (N*(1-e2)/(1-e2*Math.sin(phi)**2)) * (Math.tan(phi) + (e2*Math.cos(phi)**2*Math.tan(phi)**3)/2);
            return { x: Math.round(X*0.9996 + 500000), y: Math.round(Y*0.9996) };
        }

        // ============================================================
        // 2. ΚΑΤΑΣΤΑΣΗ
        // ============================================================
        let currentPos = null;           // τελευταία έγκυρη θέση
        let polygonPoints = [];          // αποθηκευμένα σημεία
        let map, marker, polyline, polygonLayer;
        let watchId = null;              // handle για watchPosition
        let avgReadings = [];            // προσωρινές μετρήσεις για μέσο όρο
        let isAveraging = false;

        // Παράμετροι μέσου όρου
        const AVG_DURATION = 8000;        // 8 δευτερόλεπτα συλλογής
        const MAX_ACCURACY = 20;          // αγνοούμε μετρήσεις > 20μ
        const MIN_READINGS = 3;           // θέλουμε τουλάχιστον 3 έγκυρες

        // ============================================================
        // 3. ΧΑΡΤΗΣ
        // ============================================================
        function initMap() {
            map = L.map('map').setView([38.0, 23.7], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // ============================================================
        // 4. ΛΗΨΗ GPS (άμεση)
        // ============================================================
        function getGPS() {
            if (!navigator.geolocation) {
                setStatus('❌ GPS δεν υποστηρίζεται', 'red');
                return;
            }
            setStatus('⏳ Αναζήτηση σήματος...', 'orange');
            navigator.geolocation.getCurrentPosition(
                (pos) => { processPosition(pos); },
                (err) => { setStatus('❌ Σφάλμα: '+err.message, 'red'); },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        // ============================================================
        // 5. ΕΠΕΞΕΡΓΑΣΙΑ ΜΕΤΡΗΣΗΣ (κοινή για όλες)
        // ============================================================
        function processPosition(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const alt = pos.coords.altitude;
            const acc = pos.coords.accuracy;
            const eg = wgs84ToEGSA87(lat, lon);

            currentPos = {
                lat, lon, x: eg.x, y: eg.y,
                alt: alt !== null ? Math.round(alt*10)/10 : null,
                acc: acc !== null ? Math.round(acc*10)/10 : null
            };

            // Ενημέρωση UI
            updateInfo(currentPos);
            document.getElementById('addBtn').disabled = false;

            // Σημάδι χάρτη
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`📍 ${eg.x}, ${eg.y}<br>Υψ.${currentPos.alt||'N/A'}m | ±${currentPos.acc||'N/A'}m`)
                .openPopup();
            map.setView([lat, lon], 15);

            setStatus('✅ Θέση λήφθηκε', 'green');
        }

        // ============================================================
        // 6. ΜΕΣΟΣ ΟΡΟΣ (με καθυστέρηση)
        // ============================================================
        function startAverage() {
            if (isAveraging) return;
            if (!navigator.geolocation) {
                setStatus('❌ GPS δεν υποστηρίζεται', 'red');
                return;
            }

            isAveraging = true;
            avgReadings = [];
            document.getElementById('avgBtn').disabled = true;
            setStatus('⏳ Συλλογή μετρήσεων... 0", orange');

            // Ξεκινάμε παρακολούθηση
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const acc = pos.coords.accuracy;
                    // Αγνοούμε μετρήσεις με χαμηλή ακρίβεια
                    if (acc > MAX_ACCURACY) {
                        setStatus(`⏳ Απόρριψη (ακρίβεια ${Math.round(acc)}m > ${MAX_ACCURACY}m)`, 'orange');
                        return;
                    }
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const alt = pos.coords.altitude;
                    const eg = wgs84ToEGSA87(lat, lon);
                    avgReadings.push({
                        lat, lon, x: eg.x, y: eg.y,
                        alt: alt !== null ? alt : null,
                        acc: acc
                    });
                    setStatus(`⏳ Συλλογή... ${avgReadings.length} μετρήσεις (απόρριψη >${MAX_ACCURACY}m)`, 'orange');
                },
                (err) => {
                    setStatus('❌ Σφάλμα GPS: '+err.message, 'red');
                    stopAveraging(false);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );

            // Σταματάμε μετά από AVG_DURATION ms
            setTimeout(() => {
                stopAveraging(true);
            }, AVG_DURATION);
        }

        // ============================================================
        // 7. ΣΤΑΜΑΤΗΜΑ ΜΕΣΟΥ ΟΡΟΥ & ΥΠΟΛΟΓΙΣΜΟΣ
        // ============================================================
        function stopAveraging(calculate) {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isAveraging = false;
            document.getElementById('avgBtn').disabled = false;

            if (!calculate || avgReadings.length < MIN_READINGS) {
                setStatus(`⚠️ Λίγες μετρήσεις (${avgReadings.length}<${MIN_READINGS})`, 'red');
                avgReadings = [];
                return;
            }

            // Υπολογισμός μέσου όρου
            const n = avgReadings.length;
            let sumX = 0, sumY = 0, sumAlt = 0, sumAcc = 0;
            let altCount = 0;
            avgReadings.forEach(r => {
                sumX += r.x;
                sumY += r.y;
                if (r.alt !== null) { sumAlt += r.alt; altCount++; }
                sumAcc += r.acc;
            });
            const avgX = Math.round(sumX / n);
            const avgY = Math.round(sumY / n);
            const avgAlt = altCount > 0 ? Math.round((sumAlt/altCount)*10)/10 : null;
            const avgAcc = Math.round((sumAcc/n)*10)/10;

            // Υπολογισμός τυπικής απόκλισης (για να δείξουμε διασπορά)
            let stdX = 0, stdY = 0;
            avgReadings.forEach(r => {
                stdX += (r.x - avgX)**2;
                stdY += (r.y - avgY)**2;
            });
            stdX = Math.sqrt(stdX / n);
            stdY = Math.sqrt(stdY / n);
            const spread = Math.round((stdX + stdY) / 2);

            // Δημιουργία θέσης-μέσου όρου
            currentPos = {
                lat: avgReadings.reduce((s,r) => s+r.lat, 0)/n,
                lon: avgReadings.reduce((s,r) => s+r.lon, 0)/n,
                x: avgX, y: avgY,
                alt: avgAlt,
                acc: avgAcc,
                isAverage: true,
                spread: spread,
                readings: n
            };

            // Ενημέρωση UI
            updateInfo(currentPos);
            document.getElementById('addBtn').disabled = false;

            // Χρώμα ανάλογα με την ακρίβεια
            let color = avgAcc < 5 ? 'green' : (avgAcc < 15 ? 'orange' : 'red');
            setStatus(`✅ Μέσος όρος από ${n} μετρήσεις | Ακρίβεια ±${avgAcc}m | Διασπορά ±${spread}m`, color);

            // Σημάδι χάρτη (με μωβ χρώμα για να ξεχωρίζει)
            if (marker) map.removeLayer(marker);
            marker = L.marker([currentPos.lat, currentPos.lon], {
                icon: L.divIcon({ html: '⭐', className: 'custom-marker', iconSize: [30,30] })
            }).addTo(map)
                .bindPopup(`📊 Μέσος Όρος<br>X=${avgX}, Y=${avgY}<br>Υψ.${avgAlt||'N/A'}m<br>Ακρίβεια ±${avgAcc}m<br>Διασπορά ±${spread}m`)
                .openPopup();
            map.setView([currentPos.lat, currentPos.lon], 15);

            avgReadings = [];
        }

        // ============================================================
        // 8. ΠΡΟΣΘΗΚΗ ΣΗΜΕΙΟΥ (από currentPos)
        // ============================================================
        function addPoint() {
            if (!currentPos) {
                alert('Πάρε πρώτα GPS ή Μέσο Όρο!');
                return;
            }
            polygonPoints.push({ ...currentPos });
            updateDisplay();

            // Σχεδίαση πολυγώνου
            const ll = polygonPoints.map(p => [p.lat, p.lon]);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);

            if (ll.length === 1) {
                polygonLayer = L.marker(ll[0]).addTo(map);
            } else {
                polyline = L.polyline(ll, { color: '#e94560', weight: 3 }).addTo(map);
                if (ll.length >= 3) {
                    polygonLayer = L.polygon(ll, { color: '#e94560', fillColor: '#e94560', fillOpacity: 0.2 }).addTo(map);
                }
            }
            map.setView(ll[ll.length-1], 15);
            setStatus(`➕ Προστέθηκε σημείο #${polygonPoints.length}`, 'green');
        }

        // ============================================================
        // 9. ΕΝΗΜΕΡΩΣΗ ΠΛΗΡΟΦΟΡΙΩΝ
        // ============================================================
        function updateInfo(pos) {
            let altText = pos.alt !== null ? `${pos.alt} m` : 'N/A';
            let accText = pos.acc !== null ? `±${pos.acc} m` : 'N/A';
            document.getElementById('currentPos').innerHTML =
                `X=${pos.x} m, Y=${pos.y} m &nbsp; <span style="font-size:11px;color:#aaa;">(${pos.lat.toFixed(5)}, ${pos.lon.toFixed(5)})</span>`;
            document.getElementById('extraInfo').innerHTML =
                `📏 Υψόμετρο: ${altText} &nbsp;|&nbsp; 🎯 Ακρίβεια: ${accText}` +
                (pos.isAverage ? ` &nbsp;|&nbsp; 📊 Μέσος από ${pos.readings} μετρήσεις, διασπορά ±${pos.spread}m` : '');
        }

        // ============================================================
        // 10. ΛΙΣΤΑ ΣΗΜΕΙΩΝ (με χρώματα)
        // ============================================================
        function updateDisplay() {
            document.getElementById('pointCount').innerText = polygonPoints.length;
            const list = document.getElementById('coords-list');
            list.innerHTML = polygonPoints.map((p, i) => {
                let altTxt = p.alt !== null ? `${p.alt}m` : 'N/A';
                let accTxt = p.acc !== null ? `±${p.acc}m` : 'N/A';
                let badgeClass = p.acc < 5 ? 'badge-green' : (p.acc < 15 ? 'badge-orange' : 'badge-red');
                let badgeLabel = p.acc < 5 ? '✅' : (p.acc < 15 ? '🟡' : '🔴');
                let isAvg = p.isAverage ? '⭐ ' : '';
                return `<div>
                    <span class="badge ${badgeClass}">${badgeLabel}</span>
                    ${isAvg}#${i+1} → X=${p.x}m, Y=${p.y}m
                    <span class="detail">Υψ.${altTxt} | ${accTxt}</span>
                </div>`;
            }).join('');
            list.scrollTop = list.scrollHeight;
        }

        // ============================================================
        // 11. SET STATUS
        // ============================================================
        function setStatus(msg, color='white') {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.style.color = color;
        }

        // ============================================================
        // 12. ΕΞΑΓΩΓΕΣ (DXF, KMZ) - ίδιες με πριν
        // ============================================================
        function exportDXF() {
            if (polygonPoints.length < 3) { alert('⚠️ Χρειάζονται ≥3 σημεία!'); return; }
            let dxf = `0\nSECTION\n2\nENTITIES\n0\nLWPOLYLINE\n8\n0\n90\n${polygonPoints.length}\n70\n1\n`;
            polygonPoints.forEach(p => {
                const z = (p.alt !== null) ? p.alt : 0;
                dxf += `10\n${p.x}\n20\n${p.y}\n38\n${z}\n`;
            });
            dxf += `0\nENDSEC\n0\nEOF\n`;
            const blob = new Blob([dxf], { type: 'application/dxf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `polygon_${new Date().toISOString().slice(0,10)}.dxf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert('✅ DXF κατέβηκε!');
        }

        function exportKMZ() {
            if (polygonPoints.length < 3) { alert('⚠️ Χρειάζονται ≥3 σημεία!'); return; }
            let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>Πολύγωνο GPS</name>
    <description>Δημιουργήθηκε με Greek Grid GPS Pro</description>`;
            polygonPoints.forEach((p, i) => {
                const alt = (p.alt !== null) ? p.alt : 0;
                const label = p.isAverage ? ' (Μέσος Όρος)' : '';
                kml += `
    <Placemark>
      <name>Σημείο ${i+1}${label}</name>
      <description>X=${p.x} Y=${p.y} | Υψόμετρο: ${alt}m</description>
      <Point>
        <coordinates>${p.lon},${p.lat},${alt}</coordinates>
      </Point>
    </Placemark>`;
            });
            const coords = polygonPoints.map(p => {
                const alt = (p.alt !== null) ? p.alt : 0;
                return `${p.lon},${p.lat},${alt}`;
            }).join(' ');
            kml += `
    <Placemark>
      <name>Πολύγωνο</name>
      <Polygon>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>${coords}</coordinates>
          </LinearRing>
        </outerBoundaryIs>
      </Polygon>
    </Placemark>
  </Document>
</kml>`;
            const zip = new JSZip();
            zip.file("polygon.kml", kml);
            zip.generateAsync({ type: "blob" }).then(function(content) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = `polygon_${new Date().toISOString().slice(0,10)}.kmz`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                alert('✅ KMZ κατέβηκε!');
            });
        }

        // ============================================================
        // 13. ΚΑΘΑΡΙΣΜΟΣ
        // ============================================================
        function clearAll() {
            polygonPoints = [];
            currentPos = null;
            document.getElementById('currentPos').innerText = 'Αναμονή GPS...';
            document.getElementById('pointCount').innerText = '0';
            document.getElementById('coords-list').innerHTML = '';
            document.getElementById('addBtn').disabled = true;
            document.getElementById('extraInfo').innerHTML = '';
            setStatus('🟢 Έτοιμο', 'white');
            if (marker) map.removeLayer(marker);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);
            marker = polyline = polygonLayer = null;
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            isAveraging = false;
            avgReadings = [];
            document.getElementById('avgBtn').disabled = false;
        }

        // ============================================================
        // 14. ΕΚΚΙΝΗΣΗ
        // ============================================================
        window.onload = initMap;
    </script>
</body>
</html>
