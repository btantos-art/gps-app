<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greek Grid GPS Pro - Τοπογραφικό Εργαλείο</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        #map { height: 45vh; width: 100%; border-bottom: 3px solid #e94560; }
        #controls { padding: 4px 6px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; background: #16213e; }
        button { padding: 4px 8px; border: none; border-radius: 30px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1 1 auto; min-width: 40px; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-gps { background: #4CAF50; color: white; }
        .btn-avg { background: #2196F3; color: white; }
        .btn-add { background: #e94560; color: white; }
        .btn-dxf { background: #0f3460; color: white; }
        .btn-kmz { background: #ff9800; color: white; }
        .btn-csv { background: #9c27b0; color: white; }
        .btn-map { background: #8bc34a; color: #1a1a2e; }
        .btn-clear { background: #533483; color: white; }
        .btn-ref { background: #00bcd4; color: white; }
        .btn-upload { background: #ff5722; color: white; }
        #info { padding: 4px 8px; background: #0f3460; margin: 3px 5px; border-radius: 6px; font-size: 10px; line-height: 1.3; min-height: 35px; }
        #info strong { color: #e94560; }
        #status { padding: 3px 6px; margin: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; background: #1a1a2e; }
        #progress-bar { width: 100%; height: 2px; background: #333; border-radius: 2px; margin: 2px 0; overflow: hidden; display: none; }
        #progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4CAF50, #8bc34a); border-radius: 2px; transition: width 0.3s; }
        #settings { display: flex; flex-wrap: wrap; gap: 3px; padding: 3px 6px; background: #16213e; margin: 2px 5px; border-radius: 4px; align-items: center; font-size: 9px; }
        #settings label { display: flex; align-items: center; gap: 2px; }
        #settings input[type="number"] { width: 35px; padding: 1px 2px; border-radius: 3px; border: none; background: #1a1a2e; color: white; font-size: 9px; text-align: center; }
        #settings input[type="text"] { width: 60px; padding: 1px 2px; border-radius: 3px; border: none; background: #1a1a2e; color: white; font-size: 9px; }
        #coords-list { padding: 3px 5px; max-height: 70px; overflow-y: auto; background: #16213e; margin: 0 5px 5px; border-radius: 4px; font-size: 9px; font-family: monospace; }
        #coords-list div { padding: 2px 0; border-bottom: 1px solid #2a3a5e; display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
        .badge { display: inline-block; padding: 0 5px; border-radius: 20px; font-size: 8px; font-weight: bold; }
        .badge-green { background: #4CAF50; color: white; }
        .badge-orange { background: #ff9800; color: white; }
        .badge-red { background: #f44336; color: white; }
        .detail { color: #aaa; font-size: 8px; margin-left: auto; }
        .area-display { background: #0f3460; padding: 2px 8px; border-radius: 20px; font-weight: bold; color: #ff9800; font-size: 10px; }
        .ref-marker { filter: drop-shadow(0 0 3px #00bcd4); }
        .trig-marker { filter: drop-shadow(0 0 3px #ff9800); }
        @media (max-width: 600px) { button { font-size: 8px; padding: 3px 5px; min-width: 35px; } #info { font-size: 9px; } #settings { font-size: 8px; } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button class="btn-gps" onclick="getGPS()">📍 GPS</button>
        <button class="btn-avg" onclick="startAverage()" id="avgBtn">📊 Μ.Ο.</button>
        <button class="btn-add" onclick="addPoint()" id="addBtn" disabled>➕ Προσθ.</button>
        <button class="btn-ref" onclick="loadTrigPointsFromGitHub()" id="refBtn">📍 Τριγωνομετρικά</button>
        <button class="btn-upload" onclick="document.getElementById('csvUpload').click()">📤 Φόρτωση CSV</button>
        <input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="loadCustomRefPoints(event)">
        <button class="btn-dxf" onclick="exportDXF()">💾 DXF</button>
        <button class="btn-kmz" onclick="exportKMZ()">🌍 KMZ</button>
        <button class="btn-csv" onclick="exportCSV()">📊 CSV</button>
        <button class="btn-map" onclick="toggleMap()" id="mapBtn">🛰️ Δορυφόρος</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Καθαρισμός</button>
    </div>

    <div id="status">🟢 Έτοιμο</div>
    <div id="progress-bar"><div id="progress-bar-fill"></div></div>

    <div id="settings">
        <label>🎯 Όριο ακρίβειας: <input type="number" id="maxAccInput" value="20" min="3" max="50" step="1"> m</label>
        <label>⏹️ Διασπορά: <input type="number" id="spreadStopInput" value="1" min="0.5" max="5" step="0.5"> m</label>
        <label>📝 Κωδικός: <input type="text" id="pointCodeInput" placeholder="π.χ. ST01"></label>
        <span id="areaDisplay" class="area-display">📐 Εμβαδό: 0.00 τ.μ.</span>
    </div>

    <div id="info">
        <strong>📍 Θέση (ΕΓΣΑ87):</strong> <span id="currentPos">Αναμονή GPS...</span><br>
        <strong>📐 Σημεία:</strong> <span id="pointCount">0</span> &nbsp;|&nbsp; <strong>🛰️ Δορυφόροι:</strong> <span id="satCount">-</span>
        <span id="extraInfo" style="display:block;margin-top:2px;font-size:9px;color:#aaa;"></span>
    </div>

    <div id="coords-list"></div>

    <script>
        // ============================================================
        // 1. ΜΕΤΑΤΡΟΠΗ WGS84 <-> ΕΓΣΑ87
        // ============================================================
        function wgs84ToEGSA87(lat, lon) {
            const a = 6378137.0, f = 1/298.257223563, e2 = 2*f - f*f;
            const phi = lat * Math.PI/180, lam = lon * Math.PI/180;
            const N = a / Math.sqrt(1 - e2 * Math.sin(phi)**2);
            const L0 = 24 * Math.PI/180, dL = lam - L0;
            const X = N * Math.cos(phi) * dL;
            const Y = (N*(1-e2)/(1-e2*Math.sin(phi)**2)) * (Math.tan(phi) + (e2*Math.cos(phi)**2*Math.tan(phi)**3)/2);
            return { x: Math.round(X*0.9996 + 500000), y: Math.round(Y*0.9996) };
        }

        // ============================================================
        // 2. ΥΠΟΛΟΓΙΣΜΟΙ
        // ============================================================
        function calculateArea(pts) {
            if (pts.length < 3) return 0;
            let area = 0;
            for (let i = 0; i < pts.length; i++) {
                const j = (i + 1) % pts.length;
                area += pts[i].x * pts[j].y;
                area -= pts[j].x * pts[i].y;
            }
            return Math.abs(area) / 2;
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const toRad = (deg) => deg * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ============================================================
        // 3. ΚΑΤΑΣΤΑΣΗ
        // ============================================================
        let currentPos = null;
        let polygonPoints = [];
        let map, marker, polyline, polygonLayer;
        let watchId = null;
        let avgReadings = [];
        let isAveraging = false;
        let mapLayer = 'osm';
        let trigMarkers = [];
        let allTrigPoints = [];
        let isTrigLoaded = false;
        let customRefPoints = [];
        let refMarkers = [];

        let MAX_ACCURACY = 20;
        let SPREAD_STOP = 1.0;

        // ---------- Φόρτωση / Αποθήκευση ----------
        function loadState() {
            try {
                const saved = localStorage.getItem('gpsPolygonPoints');
                if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed) && parsed.length > 0) { polygonPoints = parsed; updateDisplay(); drawPolygon(); setStatus(`📂 Φορτώθηκαν ${polygonPoints.length} σημεία`, 'white'); } }
                const acc = localStorage.getItem('gpsMaxAccuracy'); if (acc) { MAX_ACCURACY = parseFloat(acc); document.getElementById('maxAccInput').value = MAX_ACCURACY; }
                const sp = localStorage.getItem('gpsSpreadStop'); if (sp) { SPREAD_STOP = parseFloat(sp); document.getElementById('spreadStopInput').value = SPREAD_STOP; }
            } catch(e) {}
        }
        function saveState() {
            try {
                localStorage.setItem('gpsPolygonPoints', JSON.stringify(polygonPoints));
                localStorage.setItem('gpsMaxAccuracy', MAX_ACCURACY);
                localStorage.setItem('gpsSpreadStop', SPREAD_STOP);
            } catch(e) {}
        }

        // ============================================================
        // 4. ΧΑΡΤΗΣ
        // ============================================================
        function initMap() {
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
            const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© ESRI' });
            const saved = localStorage.getItem('gpsMapLayer');
            mapLayer = (saved === 'satellite') ? 'satellite' : 'osm';
            const initialLayer = (mapLayer === 'satellite') ? satellite : osm;
            map = L.map('map', { layers: [initialLayer] }).setView([38.0, 23.7], 7);
            map._layers = { osm, satellite };
            document.getElementById('mapBtn').innerHTML = (mapLayer === 'satellite') ? '🗺️ Χάρτης' : '🛰️ Δορυφόρος';
            loadState();
            if (polygonPoints.length > 0) drawPolygon();

            map.on('moveend zoomend', function() {
                if (isTrigLoaded && allTrigPoints.length > 0) {
                    updateVisibleTrigPoints();
                }
            });
        }

        function toggleMap() {
            const osm = map._layers.osm, sat = map._layers.satellite;
            if (mapLayer === 'osm') { map.removeLayer(osm); map.addLayer(sat); mapLayer = 'satellite'; document.getElementById('mapBtn').innerHTML = '🗺️ Χάρτης'; }
            else { map.removeLayer(sat); map.addLayer(osm); mapLayer = 'osm'; document.getElementById('mapBtn').innerHTML = '🛰️ Δορυφόρος'; }
            localStorage.setItem('gpsMapLayer', mapLayer);
        }

        // ============================================================
        // 5. GPS
        // ============================================================
        function getGPS() {
            if (!navigator.geolocation) { setStatus('❌ GPS δεν υποστηρίζεται', 'red'); return; }
            setStatus('⏳ Αναζήτηση σήματος...', 'orange');
            navigator.geolocation.getCurrentPosition(
                (pos) => { processPosition(pos); },
                (err) => { setStatus('❌ Σφάλμα: '+err.message, 'red'); },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function processPosition(pos) {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const alt = pos.coords.altitude, acc = pos.coords.accuracy;
            const sats = pos.coords.satellites || null;
            const eg = wgs84ToEGSA87(lat, lon);
            const code = document.getElementById('pointCodeInput').value.trim() || '';

            currentPos = {
                lat, lon, x: eg.x, y: eg.y,
                alt: alt !== null ? Math.round(alt*10)/10 : null,
                acc: acc !== null ? Math.round(acc*10)/10 : null,
                satellites: sats,
                code: code
            };

            updateInfo(currentPos);
            document.getElementById('addBtn').disabled = false;
            document.getElementById('satCount').innerText = (sats !== null) ? sats : 'N/A';

            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`📍 ${eg.x}, ${eg.y}<br>Υψ.${currentPos.alt||'N/A'}m | ±${currentPos.acc||'N/A'}m<br>🛰️ ${sats||'N/A'}${code ? ' | Κωδ.: '+code : ''}`)
                .openPopup();
            map.setView([lat, lon], 15);
            setStatus('✅ Θέση λήφθηκε', 'green');

            if (isTrigLoaded) {
                showNearbyTrigPoints(lat, lon);
            }
        }

        // ============================================================
        // 6. ΜΕΣΟΣ ΟΡΟΣ
        // ============================================================
        function startAverage() {
            if (isAveraging) return;
            if (!navigator.geolocation) { setStatus('❌ GPS δεν υποστηρίζεται', 'red'); return; }

            MAX_ACCURACY = parseFloat(document.getElementById('maxAccInput').value) || 20;
            SPREAD_STOP = parseFloat(document.getElementById('spreadStopInput').value) || 1.0;
            localStorage.setItem('gpsMaxAccuracy', MAX_ACCURACY);
            localStorage.setItem('gpsSpreadStop', SPREAD_STOP);

            isAveraging = true;
            avgReadings = [];
            document.getElementById('avgBtn').disabled = true;
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('progress-bar-fill').style.width = '0%';
            setStatus(`⏳ Συλλογή (όριο ${MAX_ACCURACY}m, διασπορά <${SPREAD_STOP}m)`, 'orange');

            const startTime = Date.now();
            let lastSpread = Infinity;

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const acc = pos.coords.accuracy;
                    if (acc > MAX_ACCURACY) {
                        setStatus(`⏳ Απόρριψη (ακρ. ${Math.round(acc)}m > ${MAX_ACCURACY}m)`, 'orange');
                        return;
                    }
                    const lat = pos.coords.latitude, lon = pos.coords.longitude;
                    const alt = pos.coords.altitude, sats = pos.coords.satellites || null;
                    const eg = wgs84ToEGSA87(lat, lon);
                    avgReadings.push({
                        lat, lon, x: eg.x, y: eg.y,
                        alt: alt !== null ? alt : null,
                        acc: acc,
                        satellites: sats
                    });

                    if (avgReadings.length >= 3) {
                        const n = avgReadings.length;
                        const meanX = avgReadings.reduce((s,r) => s+r.x, 0)/n;
                        const meanY = avgReadings.reduce((s,r) => s+r.y, 0)/n;
                        let stdX = 0, stdY = 0;
                        avgReadings.forEach(r => { stdX += (r.x - meanX)**2; stdY += (r.y - meanY)**2; });
                        stdX = Math.sqrt(stdX/n); stdY = Math.sqrt(stdY/n);
                        const spread = (stdX + stdY) / 2;
                        lastSpread = spread;

                        if (spread < SPREAD_STOP) {
                            setStatus(`⏹️ Διασπορά ${spread.toFixed(2)}m < ${SPREAD_STOP}m -> σταμάτημα`, 'green');
                            stopAveraging(true);
                            return;
                        }
                    }

                    const elapsed = Date.now() - startTime;
                    const pct = Math.min(100, Math.round((elapsed / 10000) * 100));
                    document.getElementById('progress-bar-fill').style.width = pct + '%';
                    setStatus(`⏳ Συλλογή... ${avgReadings.length} μετρήσεις (${pct}%) | διασπορά ${lastSpread.toFixed(2)}m`, 'orange');
                },
                (err) => {
                    setStatus('❌ Σφάλμα GPS: '+err.message, 'red');
                    stopAveraging(false);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );

            setTimeout(() => { if (isAveraging) stopAveraging(true); }, 10000);
        }

        function stopAveraging(calculate) {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            isAveraging = false;
            document.getElementById('avgBtn').disabled = false;
            document.getElementById('progress-bar').style.display = 'none';

            if (!calculate || avgReadings.length < 2) {
                setStatus(`⚠️ Λίγες μετρήσεις (${avgReadings.length}<2)`, 'red');
                avgReadings = [];
                return;
            }

            const n = avgReadings.length;
            let sumX = 0, sumY = 0, sumAlt = 0, sumAcc = 0, sumSats = 0;
            let altCount = 0, satsCount = 0;
            avgReadings.forEach(r => {
                sumX += r.x; sumY += r.y;
                if (r.alt !== null) { sumAlt += r.alt; altCount++; }
                sumAcc += r.acc;
                if (r.satellites !== null) { sumSats += r.satellites; satsCount++; }
            });
            const avgX = Math.round(sumX / n);
            const avgY = Math.round(sumY / n);
            const avgAlt = altCount > 0 ? Math.round((sumAlt/altCount)*10)/10 : null;
            const avgAcc = Math.round((sumAcc/n)*10)/10;
            const avgSats = satsCount > 0 ? Math.round(sumSats/satsCount) : null;

            let stdX = 0, stdY = 0;
            avgReadings.forEach(r => { stdX += (r.x - avgX)**2; stdY += (r.y - avgY)**2; });
            stdX = Math.sqrt(stdX/n); stdY = Math.sqrt(stdY/n);
            const spread = (stdX + stdY) / 2;

            const code = document.getElementById('pointCodeInput').value.trim() || '';

            currentPos = {
                lat: avgReadings.reduce((s,r) => s+r.lat, 0)/n,
                lon: avgReadings.reduce((s,r) => s+r.lon, 0)/n,
                x: avgX, y: avgY,
                alt: avgAlt,
                acc: avgAcc,
                satellites: avgSats,
                code: code,
                isAverage: true,
                spread: spread,
                readings: n
            };

            updateInfo(currentPos);
            document.getElementById('addBtn').disabled = false;

            let color = avgAcc < 5 ? 'green' : (avgAcc < 15 ? 'orange' : 'red');
            setStatus(`✅ Μέσος όρος από ${n} μετρήσεις | Ακρ. ±${avgAcc}m | Διασπορά ±${spread.toFixed(2)}m`, color);

            if (marker) map.removeLayer(marker);
            marker = L.marker([currentPos.lat, currentPos.lon], {
                icon: L.divIcon({ html: '⭐', className: 'custom-marker', iconSize: [30,30] })
            }).addTo(map)
                .bindPopup(`📊 Μέσος Όρος<br>X=${avgX}, Y=${avgY}<br>Υψ.${avgAlt||'N/A'}m<br>Ακρ. ±${avgAcc}m<br>Διασπορά ±${spread.toFixed(2)}m<br>🛰️ ${avgSats||'N/A'}${code ? ' | Κωδ.: '+code : ''}`)
                .openPopup();
            map.setView([currentPos.lat, currentPos.lon], 15);
            avgReadings = [];
        }

        // ============================================================
        // 7. ΠΡΟΣΘΗΚΗ ΣΗΜΕΙΟΥ
        // ============================================================
        function addPoint() {
            if (!currentPos) { alert('Πάρε πρώτα GPS ή Μέσο Όρο!'); return; }
            const code = document.getElementById('pointCodeInput').value.trim() || '';
            const pointToAdd = { ...currentPos, code: code };
            polygonPoints.push(pointToAdd);
            saveState();
            updateDisplay();
            drawPolygon();
            setStatus(`➕ Προστέθηκε σημείο #${polygonPoints.length}${code ? ' ('+code+')' : ''}`, 'green');
            document.getElementById('pointCodeInput').value = '';
        }

        // ============================================================
        // 8. ΣΧΕΔΙΑΣΗ ΠΟΛΥΓΩΝΟΥ & ΕΜΒΑΔΟ
        // ============================================================
        function drawPolygon() {
            const ll = polygonPoints.map(p => [p.lat, p.lon]);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);

            if (ll.length === 1) {
                polygonLayer = L.marker(ll[0]).addTo(map);
            } else {
                polyline = L.polyline(ll, { color: '#e94560', weight: 3 }).addTo(map);
                if (ll.length >= 3) {
                    polygonLayer = L.polygon(ll, { color: '#e94560', fillColor: '#e94560', fillOpacity: 0.2 }).addTo(map);
                    const area = calculateArea(polygonPoints);
                    document.getElementById('areaDisplay').innerHTML = `📐 Εμβαδό: ${area.toFixed(2)} τ.μ. (${(area/1000).toFixed(2)} στρ.)`;
                } else {
                    document.getElementById('areaDisplay').innerHTML = `📐 Εμβαδό: χρειάζονται ≥3 σημεία`;
                }
            }
            if (ll.length > 0) map.setView(ll[ll.length-1], 15);
        }

        // ============================================================
        // 9. ΕΝΗΜΕΡΩΣΗ UI
        // ============================================================
        function updateInfo(pos) {
            let altText = pos.alt !== null ? `${pos.alt} m` : 'N/A';
            let accText = pos.acc !== null ? `±${pos.acc} m` : 'N/A';
            let satText = pos.satellites !== null ? pos.satellites : 'N/A';
            let codeText = pos.code ? ` | Κωδ.: ${pos.code}` : '';
            document.getElementById('currentPos').innerHTML =
                `X=${pos.x} m, Y=${pos.y} m &nbsp; <span style="font-size:9px;color:#aaa;">(${pos.lat.toFixed(5)}, ${pos.lon.toFixed(5)})</span>`;
            document.getElementById('extraInfo').innerHTML =
                `📏 Υψόμετρο: ${altText} &nbsp;|&nbsp; 🎯 Ακρίβεια: ${accText}${codeText}` +
                (pos.isAverage ? ` &nbsp;|&nbsp; 📊 Μέσος από ${pos.readings} μετρήσεις, διασπορά ±${pos.spread.toFixed(2)}m` : '');
            document.getElementById('satCount').innerText = satText;
        }

        function updateDisplay() {
            document.getElementById('pointCount').innerText = polygonPoints.length;
            const list = document.getElementById('coords-list');
            list.innerHTML = polygonPoints.map((p, i) => {
                let altTxt = p.alt !== null ? `${p.alt}m` : 'N/A';
                let accTxt = p.acc !== null ? `±${p.acc}m` : 'N/A';
                let satTxt = p.satellites !== null ? p.satellites : 'N/A';
                let codeTxt = p.code ? ` (${p.code})` : '';
                let badgeClass = p.acc < 5 ? 'badge-green' : (p.acc < 15 ? 'badge-orange' : 'badge-red');
                let badgeLabel = p.acc < 5 ? '✅' : (p.acc < 15 ? '🟡' : '🔴');
                let isAvg = p.isAverage ? '⭐ ' : '';
                return `<div>
                    <span class="badge ${badgeClass}">${badgeLabel}</span>
                    ${isAvg}#${i+1} → X=${p.x}m, Y=${p.y}m${codeTxt}
                    <span class="detail">Υψ.${altTxt} | ${accTxt} | 🛰️${satTxt}</span>
                </div>`;
            }).join('');
            list.scrollTop = list.scrollHeight;
        }

        function setStatus(msg, color='white') {
            document.getElementById('status').innerHTML = msg;
            document.getElementById('status').style.color = color;
        }

        // ============================================================
        // 10. ΦΟΡΤΩΣΗ ΤΡΙΓΩΝΟΜΕΤΡΙΚΩΝ ΑΠΟ GITHUB (ΔΙΟΡΘΩΜΕΝΟ URL)
        // ============================================================
        // ✅ ΣΩΣΤΟ URL ΓΙΑ ΤΟ REPOSITORY ΣΟΥ
        const GITHUB_CSV_URL = 'https://raw.githubusercontent.com/btantos-art/gps-app/main/points.csv';

        async function loadTrigPointsFromGitHub() {
            const btn = document.getElementById('refBtn');
            if (btn.disabled) return;
            btn.disabled = true;
            btn.textContent = '⏳ Φόρτωση...';
            setStatus('⏳ Φόρτωση τριγωνομετρικών σημείων από GitHub...', 'orange');

            try {
                // Δοκιμή φόρτωσης από το σωστό URL
                const response = await fetch(GITHUB_CSV_URL);
                if (!response.ok) {
                    let errorMsg = `Απέτυχε η φόρτωση (HTTP ${response.status}).\n`;
                    errorMsg += `Δοκίμασα το URL:\n${GITHUB_CSV_URL}\n\n`;
                    if (response.status === 404) {
                        errorMsg += 'Το αρχείο points.csv δεν βρέθηκε.\n';
                        errorMsg += 'Έλεγξε:\n';
                        errorMsg += '1. Το όνομα του repository είναι gps-app (όχι GreekGridGPS)\n';
                        errorMsg += '2. Το αρχείο βρίσκεται στον root φάκελο (όχι μέσα σε φάκελο)\n';
                        errorMsg += '3. Το branch είναι main (όχι master)\n\n';
                        errorMsg += '🔧 Γρήγορη λύση: Χρησιμοποίησε το κουμπί "📤 Φόρτωση CSV" για να φορτώσεις το αρχείο τοπικά.';
                    } else if (response.status === 403) {
                        errorMsg += 'Το repository είναι πιθανώς ιδιωτικό (Private).\n';
                        errorMsg += 'Άλλαξε το σε Public ή φόρτωσε το CSV τοπικά.';
                    } else {
                        errorMsg += `Άγνωστο σφάλμα. Δοκίμασε να φορτώσεις το CSV τοπικά.`;
                    }
                    alert(errorMsg);
                    setStatus('❌ '+errorMsg, 'red');
                    btn.textContent = '📍 Τριγωνομετρικά';
                    btn.disabled = false;
                    return;
                }

                const csvText = await response.text();
                const lines = csvText.replace(/^\uFEFF/, '').split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) throw new Error('Το αρχείο είναι άδειο');

                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                const latIdx = headers.indexOf('lat');
                const lonIdx = headers.indexOf('lon');
                const nameIdx = headers.indexOf('name');
                const idIdx = headers.indexOf('gys_id');
                const elevIdx = headers.indexOf('elevation');
                const orderIdx = headers.indexOf('order');
                const xIdx = headers.indexOf('x');
                const yIdx = headers.indexOf('y');

                if (latIdx === -1 || lonIdx === -1) {
                    throw new Error('Το CSV δεν έχει στήλες lat/lon');
                }

                allTrigPoints = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',').map(c => c.trim());
                    if (cols.length < Math.max(latIdx, lonIdx) + 1) continue;
                    const lat = parseFloat(cols[latIdx]);
                    const lon = parseFloat(cols[lonIdx]);
                    if (isNaN(lat) || isNaN(lon)) continue;
                    const name = (nameIdx !== -1 && cols[nameIdx]) ? cols[nameIdx] : '';
                    const gysId = (idIdx !== -1 && cols[idIdx]) ? cols[idIdx] : '';
                    const elev = (elevIdx !== -1 && cols[elevIdx]) ? parseFloat(cols[elevIdx]) : null;
                    const order = (orderIdx !== -1 && cols[orderIdx]) ? cols[orderIdx] : '';
                    let x = null, y = null;
                    if (xIdx !== -1 && yIdx !== -1 && cols[xIdx] && cols[yIdx]) {
                        x = parseFloat(cols[xIdx]);
                        y = parseFloat(cols[yIdx]);
                    }
                    allTrigPoints.push({
                        lat, lon, name, gysId, elev, order,
                        x: x || wgs84ToEGSA87(lat, lon).x,
                        y: y || wgs84ToEGSA87(lat, lon).y
                    });
                }

                isTrigLoaded = true;
                setStatus(`✅ Φορτώθηκαν ${allTrigPoints.length} τριγωνομετρικά σημεία`, 'green');
                updateVisibleTrigPoints();

                btn.textContent = '📍 Τριγωνομετρικά';
                btn.disabled = false;

            } catch (error) {
                console.error(error);
                setStatus('❌ Σφάλμα φόρτωσης τριγωνομετρικών', 'red');
                alert('Απέτυχε η φόρτωση. Δοκίμασε να φορτώσεις το CSV τοπικά με το κουμπί "📤 Φόρτωση CSV".');
                btn.textContent = '📍 Τριγωνομετρικά';
                btn.disabled = false;
            }
        }

        // ============================================================
        // 11. ΔΥΝΑΜΙΚΗ ΕΜΦΑΝΙΣΗ ΣΗΜΕΙΩΝ
        // ============================================================
        function updateVisibleTrigPoints() {
            if (!isTrigLoaded || allTrigPoints.length === 0) return;

            trigMarkers.forEach(m => map.removeLayer(m));
            trigMarkers = [];

            const bounds = map.getBounds();
            const zoom = map.getZoom();

            let maxPoints = 500;
            if (zoom < 8) maxPoints = 100;
            else if (zoom < 10) maxPoints = 300;
            else if (zoom < 12) maxPoints = 800;
            else maxPoints = 2000;

            let visible = [];
            allTrigPoints.forEach(p => {
                if (bounds.contains([p.lat, p.lon])) {
                    visible.push(p);
                }
            });

            let toShow = visible;
            if (visible.length > maxPoints) {
                const step = Math.ceil(visible.length / maxPoints);
                toShow = visible.filter((_, i) => i % step === 0);
            }

            toShow.forEach(p => {
                const eg = { x: p.x, y: p.y };
                const popupContent = `
                    <b>📍 ${p.name || 'Τριγωνομετρικό'}</b><br>
                    <b>Κωδικός ΓΥΣ:</b> ${p.gysId || 'N/A'}<br>
                    <b>Υψόμετρο:</b> ${p.elev !== null ? p.elev + ' m' : 'N/A'}<br>
                    <b>Τάξη:</b> ${p.order || 'N/A'}<br>
                    <b>ΕΓΣΑ87:</b> X=${Math.round(eg.x)}m, Y=${Math.round(eg.y)}m<br>
                    <b>WGS84:</b> ${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}
                    <br><br>
                    <button onclick="useAsReference(${p.lat}, ${p.lon}, '${p.name.replace(/'/g, "\\'") || 'Σημείο'}')" 
                            style="background:#00bcd4;color:white;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-weight:bold;">
                        ✅ Χρήση ως Σημείο Αναφοράς
                    </button>
                `;

                const marker = L.marker([p.lat, p.lon], {
                    icon: L.divIcon({
                        html: '📍',
                        className: 'trig-marker',
                        iconSize: [16, 16]
                    })
                }).addTo(map)
                  .bindPopup(popupContent);

                trigMarkers.push(marker);
            });

            setStatus(`✅ ${toShow.length} τριγωνομετρικά σημεία στο τρέχον zoom (σύνολο ${visible.length} στην περιοχή)`, 'green');
        }

        // ============================================================
        // 12. ΕΜΦΑΝΙΣΗ ΚΟΝΤΙΝΩΝ
        // ============================================================
        function showNearbyTrigPoints(lat, lon, radiusKm = 5) {
            if (!isTrigLoaded || allTrigPoints.length === 0) {
                setStatus('⚠️ Φόρτωσε πρώτα τα τριγωνομετρικά σημεία', 'orange');
                return;
            }

            let found = 0;
            trigMarkers.forEach(m => {
                const latlng = m.getLatLng();
                const dist = haversineDistance(lat, lon, latlng.lat, latlng.lng);
                if (dist <= radiusKm * 1000) {
                    found++;
                    m.bindPopup(m.getPopup().getContent() + `<br><b>Απόσταση:</b> ${dist.toFixed(1)} m`).openPopup();
                } else {
                    m.closePopup();
                }
            });

            if (found === 0) {
                setStatus(`ℹ️ Δεν βρέθηκαν τριγωνομετρικά σε ακτίνα ${radiusKm} χλμ`, 'orange');
            } else {
                setStatus(`✅ ${found} τριγωνομετρικά σε ακτίνα ${radiusKm} χλμ`, 'green');
            }
        }

        // ============================================================
        // 13. ΧΡΗΣΗ ΣΗΜΕΙΟΥ ΩΣ ΑΝΑΦΟΡΑΣ
        // ============================================================
        function useAsReference(lat, lon, name) {
            const eg = wgs84ToEGSA87(lat, lon);
            currentPos = {
                lat, lon,
                x: eg.x, y: eg.y,
                alt: null,
                acc: 0,
                satellites: null,
                code: name,
                isReference: true
            };
            updateInfo(currentPos);
            document.getElementById('addBtn').disabled = false;
            setStatus(`✅ Σημείο αναφοράς "${name}" - X=${eg.x}, Y=${eg.y}`, 'green');

            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon], {
                icon: L.divIcon({
                    html: '🔵',
                    className: 'ref-marker',
                    iconSize: [25, 25]
                })
            }).addTo(map)
              .bindPopup(`🔵 ΣΗΜΕΙΟ ΑΝΑΦΟΡΑΣ<br>${name}<br>X=${eg.x}, Y=${eg.y}`)
              .openPopup();
            map.setView([lat, lon], 15);
        }

        // ============================================================
        // 14. ΦΟΡΤΩΣΗ CUSTOM CSV
        // ============================================================
        function loadCustomRefPoints(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    const lines = text.replace(/^\uFEFF/, '').split('\n').filter(line => line.trim() !== '');
                    if (lines.length < 2) { alert('Το αρχείο CSV είναι άδειο ή έχει μόνο επικεφαλίδες'); return; }
                    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                    const latIdx = headers.indexOf('lat') !== -1 ? headers.indexOf('lat') : (headers.indexOf('latitude') !== -1 ? headers.indexOf('latitude') : -1);
                    const lonIdx = headers.indexOf('lon') !== -1 ? headers.indexOf('lon') : (headers.indexOf('longitude') !== -1 ? headers.indexOf('longitude') : -1);
                    const nameIdx = headers.indexOf('name') !== -1 ? headers.indexOf('name') : (headers.indexOf('point') !== -1 ? headers.indexOf('point') : -1);
                    const elevIdx = headers.indexOf('elev') !== -1 ? headers.indexOf('elev') : (headers.indexOf('elevation') !== -1 ? headers.indexOf('elevation') : -1);

                    if (latIdx === -1 || lonIdx === -1) {
                        alert('Το CSV πρέπει να έχει στήλες "lat" και "lon" (ή "latitude"/"longitude")');
                        return;
                    }

                    const newPoints = [];
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(',').map(c => c.trim());
                        if (cols.length < Math.max(latIdx, lonIdx) + 1) continue;
                        const lat = parseFloat(cols[latIdx]);
                        const lon = parseFloat(cols[lonIdx]);
                        if (isNaN(lat) || isNaN(lon)) continue;
                        const name = (nameIdx !== -1 && cols[nameIdx]) ? cols[nameIdx] : `Σημείο ${i}`;
                        const elev = (elevIdx !== -1 && cols[elevIdx]) ? parseFloat(cols[elevIdx]) : null;
                        newPoints.push({ name, lat, lon, elev });
                    }

                    if (newPoints.length === 0) { alert('Δεν βρέθηκαν έγκυρα σημεία στο CSV'); return; }

                    customRefPoints = newPoints;
                    customRefPoints.forEach(p => {
                        const eg = wgs84ToEGSA87(p.lat, p.lon);
                        allTrigPoints.push({
                            lat: p.lat,
                            lon: p.lon,
                            name: p.name || 'Custom',
                            gysId: 'Custom',
                            elev: p.elev || null,
                            order: 'Custom',
                            x: eg.x,
                            y: eg.y
                        });
                        const popupContent = `
                            <b>📍 ${p.name || 'Custom'}</b><br>
                            <b>Υψόμετρο:</b> ${p.elev || 'N/A'} m<br>
                            <b>Συντεταγμένες:</b><br>
                            WGS84: ${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}
                        `;
                        const marker = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({
                                html: '📌',
                                className: 'ref-marker',
                                iconSize: [18, 18]
                            })
                        }).addTo(map)
                          .bindPopup(popupContent);
                        refMarkers.push(marker);
                    });
                    setStatus(`✅ Φορτώθηκαν ${customRefPoints.length} custom σημεία αναφοράς`, 'green');
                } catch (err) {
                    alert('Σφάλμα κατά την ανάγνωση του CSV: '+err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        // 15. ΕΞΑΓΩΓΕΣ (DXF, KMZ, CSV)
        // ============================================================
        function exportDXF() {
            if (polygonPoints.length === 0) { alert('Δεν υπάρχουν σημεία!'); return; }
            let dxf = `0\nSECTION\n2\nENTITIES\n`;
            polygonPoints.forEach((p, i) => {
                const code = p.code || `P${i+1}`;
                const z = (p.alt !== null) ? p.alt : 0;
                dxf += `0\nBLOCK\n8\n0\n2\nPT${i+1}\n70\n0\n10\n0\n20\n0\n30\n0\n`;
                dxf += `0\nCIRCLE\n8\n0\n10\n0\n20\n0\n30\n0\n40\n1.5\n`;
                dxf += `0\nTEXT\n8\n0\n10\n2.5\n20\n-1.5\n30\n0\n40\n1.0\n1\n${code}\n`;
                dxf += `0\nENDBLK\n`;
            });
            polygonPoints.forEach((p, i) => {
                const z = (p.alt !== null) ? p.alt : 0;
                dxf += `0\nINSERT\n8\n0\n2\nPT${i+1}\n10\n${p.x}\n20\n${p.y}\n30\n${z}\n`;
            });
            if (polygonPoints.length >= 3) {
                dxf += `0\nLWPOLYLINE\n8\n0\n90\n${polygonPoints.length}\n70\n1\n`;
                polygonPoints.forEach(p => {
                    const z = (p.alt !== null) ? p.alt : 0;
                    dxf += `10\n${p.x}\n20\n${p.y}\n38\n${z}\n`;
                });
            }
            dxf += `0\nENDSEC\n0\nEOF\n`;
            const blob = new Blob([dxf], { type: 'application/dxf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `polygon_${new Date().toISOString().slice(0,10)}.dxf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert('✅ DXF με blocks κατέβηκε!');
        }

        function exportKMZ() {
            if (polygonPoints.length < 3) { alert('⚠️ Χρειάζονται ≥3 σημεία!'); return; }
            let kml = `<?xml version="1.0" encoding="UTF-8"?>
        <kml xmlns="http://www.opengis.net/kml/2.2">
          <Document>
            <name>Πολύγωνο GPS</name>
            <description>Δημιουργήθηκε με Greek Grid GPS Pro</description>`;
            polygonPoints.forEach((p, i) => {
                const alt = (p.alt !== null) ? p.alt : 0;
                const code = p.code || `P${i+1}`;
                const label = p.isAverage ? ' (Μέσος Όρος)' : '';
                kml += `
            <Placemark>
              <name>${code}${label}</name>
              <description>X=${p.x} Y=${p.y} | Υψόμετρο: ${alt}m</description>
              <Point>
                <coordinates>${p.lon},${p.lat},${alt}</coordinates>
              </Point>
            </Placemark>`;
            });
            const coords = polygonPoints.map(p => {
                const alt = (p.alt !== null) ? p.alt : 0;
                return `${p.lon},${p.lat},${alt}`;
            }).join(' ');
            kml += `
            <Placemark>
              <name>Πολύγωνο</name>
              <Polygon>
                <outerBoundaryIs>
                  <LinearRing>
                    <coordinates>${coords}</coordinates>
                  </LinearRing>
                </outerBoundaryIs>
              </Polygon>
            </Placemark>
          </Document>
        </kml>`;
            const zip = new JSZip();
            zip.file("polygon.kml", kml);
            zip.generateAsync({ type: "blob" }).then(function(content) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = `polygon_${new Date().toISOString().slice(0,10)}.kmz`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                alert('✅ KMZ κατέβηκε!');
            });
        }

        function exportCSV() {
            if (polygonPoints.length === 0) { alert('Δεν υπάρχουν σημεία!'); return; }
            let csv = '#,Κωδικός,X,Y,Υψόμετρο,Ακρίβεια,Δορυφόροι,Μέσος_Όρος\n';
            polygonPoints.forEach((p, i) => {
                const alt = p.alt !== null ? p.alt : '';
                const acc = p.acc !== null ? p.acc : '';
                const sats = p.satellites !== null ? p.satellites : '';
                const isAvg = p.isAverage ? 'ΝΑΙ' : 'ΟΧΙ';
                const code = p.code || '';
                csv += `${i+1},${code},${p.x},${p.y},${alt},${acc},${sats},${isAvg}\n`;
            });
            if (polygonPoints.length >= 3) {
                const area = calculateArea(polygonPoints);
                csv += `\nΕμβαδό,${area.toFixed(2)} τ.μ.,${(area/1000).toFixed(2)} στρέμματα\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `points_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert('✅ CSV κατέβηκε!');
        }

        // ============================================================
        // 16. ΚΑΘΑΡΙΣΜΟΣ
        // ============================================================
        function clearAll() {
            if (polygonPoints.length > 0 && !confirm('Σβήσιμο όλων των σημείων;')) return;
            polygonPoints = [];
            currentPos = null;
            localStorage.removeItem('gpsPolygonPoints');
            document.getElementById('currentPos').innerText = 'Αναμονή GPS...';
            document.getElementById('pointCount').innerText = '0';
            document.getElementById('coords-list').innerHTML = '';
            document.getElementById('addBtn').disabled = true;
            document.getElementById('extraInfo').innerHTML = '';
            document.getElementById('satCount').innerText = '-';
            document.getElementById('areaDisplay').innerHTML = '📐 Εμβαδό: 0.00 τ.μ.';
            document.getElementById('pointCodeInput').value = '';
            setStatus('🟢 Έτοιμο', 'white');
            if (marker) map.removeLayer(marker);
            if (polyline) map.removeLayer(polyline);
            if (polygonLayer) map.removeLayer(polygonLayer);
            marker = polyline = polygonLayer = null;
            trigMarkers.forEach(m => map.removeLayer(m));
            trigMarkers = [];
            refMarkers.forEach(m => map.removeLayer(m));
            refMarkers = [];
            customRefPoints = [];
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            isAveraging = false;
            avgReadings = [];
            document.getElementById('avgBtn').disabled = false;
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('refBtn').textContent = '📍 Τριγωνομετρικά';
            document.getElementById('refBtn').disabled = false;
        }

        // ============================================================
        // 17. ΕΚΚΙΝΗΣΗ
        // ============================================================
        window.onload = initMap;
    </script>
